<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AGD Check In">
  <meta name="theme-color" content="#BC4043">
  <meta name="robots" content="noindex, nofollow, noarchive">

  <title>AGD Client Check In</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">

  <style>
    :root {
      --brand-red: #BC4043;
      --brand-red-dark: #963336;
      --cream: #F7F3ED;
      --white: #FFFFFF;
      --ink: #20242A;
      --muted: #66707A;
      --border: #E3E6E8;
      --shadow: 0 20px 55px rgba(32, 36, 42, 0.14);
      --card-shadow: 0 10px 25px rgba(32, 36, 42, 0.13);
      --morning: #247A4A;
      --morning-dark: #1A623A;
      --afternoon: #386F9E;
      --afternoon-dark: #2B587D;
      --individual: #5E6AA8;
      --absence: #6B7E72;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overscroll-behavior: none;
    }

    button {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    .screen {
      position: fixed;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 320ms ease, visibility 320ms ease;
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    /* HOME SCREEN */
    #homeScreen {
      display: grid;
      place-items: center;
      overflow-y: auto;
      padding:
        max(24px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 50% -10%, rgba(188, 64, 67, 0.12), transparent 47%),
        var(--cream);
    }

    .home-card {
      width: min(100%, 900px);
      padding: 28px 36px 34px;
      border: 1px solid rgba(188, 64, 67, 0.08);
      border-radius: 30px;
      background: var(--white);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .home-logo {
      display: block;
      width: min(48vw, 265px);
      max-height: 185px;
      margin: 0 auto 6px;
      object-fit: contain;
    }

    h1 {
      margin: 2px 0 0;
      font-size: clamp(2rem, 4.7vw, 3.15rem);
      line-height: 1.08;
      letter-spacing: -0.035em;
    }

    .welcome-copy {
      max-width: 650px;
      margin: 14px auto 23px;
      color: var(--muted);
      font-size: clamp(1.05rem, 2.5vw, 1.28rem);
      line-height: 1.45;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .option-card {
      display: flex;
      min-width: 0;
      min-height: 190px;
      padding: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--white);
      color: var(--ink);
      box-shadow: var(--card-shadow);
      cursor: pointer;
      touch-action: manipulation;
      text-align: left;
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }

    .option-card:active {
      transform: scale(0.985);
      filter: brightness(0.97);
      box-shadow: 0 6px 16px rgba(32, 36, 42, 0.15);
    }

    .option-art {
      position: relative;
      flex: 0 0 42%;
      min-width: 150px;
      overflow: hidden;
      background: #EEF1F3;
    }

    .option-art img {
      width: 100%;
      height: 100%;
      min-height: 188px;
      object-fit: cover;
      object-position: center;
    }

    .option-art.generated {
      display: grid;
      place-items: center;
      color: var(--white);
    }

    .option-art.generated.morning {
      background: linear-gradient(145deg, var(--morning), var(--morning-dark));
    }

    .option-art.generated.afternoon {
      background: linear-gradient(145deg, var(--afternoon), var(--afternoon-dark));
    }

    .time-icon {
      display: grid;
      place-items: center;
      width: 96px;
      height: 96px;
      border: 3px solid rgba(255, 255, 255, 0.76);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.13);
      font-size: 3.4rem;
      line-height: 1;
    }

    .option-copy {
      display: flex;
      flex: 1;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      padding: 22px 22px 20px;
    }

    .option-title {
      display: block;
      font-size: clamp(1.3rem, 2.7vw, 1.72rem);
      font-weight: 800;
      line-height: 1.17;
    }

    .option-subtitle {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(0.97rem, 2.1vw, 1.1rem);
      font-weight: 600;
      line-height: 1.35;
    }

    .availability-note {
      min-height: 24px;
      margin: 19px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.4;
    }

    .privacy-note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* PREPARING SCREEN */
    #loadingScreen {
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--cream);
      text-align: center;
    }

    .loading-card {
      width: min(100%, 560px);
      padding: 42px 32px;
      border-radius: 30px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .loading-logo {
      width: min(60vw, 260px);
      max-height: 200px;
      object-fit: contain;
    }

    .loading-card h2 {
      margin: 20px 0 8px;
      font-size: clamp(2rem, 5vw, 2.85rem);
      line-height: 1.1;
    }

    .loading-message {
      margin: 0;
      color: var(--muted);
      font-size: 1.24rem;
    }

    .animated-dots::after {
      display: inline-block;
      width: 1.2em;
      content: "";
      text-align: left;
      animation: dotCycle 1.2s steps(4, end) infinite;
    }

    @keyframes dotCycle {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75%, 100% { content: "..."; }
    }

    /* FORM SCREEN */
    #formScreen {
      background: var(--white);
    }

    .form-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .form-header {
      z-index: 10;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 68px;
      padding:
        max(10px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        10px
        max(14px, env(safe-area-inset-left));
      border-bottom: 1px solid var(--border);
      background: var(--white);
      box-shadow: 0 2px 12px rgba(32, 36, 42, 0.08);
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 44px;
      padding: 8px 13px;
      border: 1px solid #D9DDE0;
      border-radius: 13px;
      background: #F8F9FA;
      color: #3E464E;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .home-button:active {
      background: #ECEFF1;
    }

    .form-title {
      margin: 0;
      overflow: hidden;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
    }

    .header-logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .iframe-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    #formFrame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--white);
    }

    .returning-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      visibility: hidden;
      opacity: 0;
      background: rgba(255, 255, 255, 0.97);
      text-align: center;
      transition: opacity 260ms ease, visibility 260ms ease;
    }

    .returning-overlay.show {
      visibility: visible;
      opacity: 1;
    }

    .returning-overlay img {
      width: min(55vw, 240px);
      max-height: 190px;
      object-fit: contain;
    }

    .returning-overlay p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1.15rem;
    }

    @media (max-width: 700px) {
      #homeScreen {
        padding: 0;
        background: var(--white);
      }

      .home-card {
        min-height: 100%;
        padding: 22px 18px 28px;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .home-logo {
        width: min(58vw, 235px);
      }

      .button-grid {
        grid-template-columns: 1fr;
      }

      .option-card {
        min-height: 150px;
      }

      .option-art {
        flex-basis: 40%;
        min-width: 130px;
      }

      .option-art img {
        min-height: 148px;
      }

      .form-header {
        grid-template-columns: auto 1fr;
      }

      .header-logo {
        display: none;
      }
    }

    @media (orientation: landscape) and (max-height: 760px) {
      .home-card {
        width: min(100%, 1050px);
        padding: 14px 24px 18px;
      }

      .home-logo {
        width: min(23vw, 190px);
        max-height: 120px;
      }

      h1 {
        font-size: 1.95rem;
      }

      .welcome-copy {
        margin: 7px auto 13px;
        font-size: 1rem;
      }

      .button-grid {
        gap: 13px;
      }

      .option-card {
        min-height: 138px;
      }

      .option-art img {
        min-height: 136px;
      }

      .time-icon {
        width: 76px;
        height: 76px;
        font-size: 2.7rem;
      }

      .option-copy {
        padding: 16px;
      }

      .option-title {
        font-size: 1.3rem;
      }

      .option-subtitle {
        margin-top: 5px;
        font-size: 0.94rem;
      }

      .availability-note {
        margin-top: 10px;
        font-size: 0.9rem;
      }

      .privacy-note {
        margin-top: 5px;
        font-size: 0.82rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <main id="homeScreen" class="screen active" aria-labelledby="appTitle">
    <section class="home-card">
      <img
        class="home-logo"
        src="agd-logo.png"
        alt="A Good Deed Behavioral Health logo"
      >

      <h1 id="appTitle">AGD Client Check In</h1>

      <p class="welcome-copy">
        Welcome! Please choose one of the options below to continue.
      </p>

      <div class="button-grid">
        <button id="morningCard" class="option-card" type="button" data-form="morning">
          <span class="option-art generated morning" aria-hidden="true">
            <span class="time-icon">☀</span>
          </span>
          <span class="option-copy">
            <span class="option-title">Morning Group</span>
            <span class="option-subtitle">8:30 AM–11:30 AM · IOP / MHDT</span>
          </span>
        </button>

        <button id="afternoonCard" class="option-card" type="button" data-form="afternoon">
          <span class="option-art generated afternoon" aria-hidden="true">
            <span class="time-icon">◐</span>
          </span>
          <span class="option-copy">
            <span class="option-title">Afternoon Group</span>
            <span class="option-subtitle">12:00 PM–1:30 PM · Wellness</span>
          </span>
        </button>

        <button id="individualCard" class="option-card" type="button" data-form="individual">
          <span class="option-art">
            <img src="individual-session.png" alt="">
          </span>
          <span class="option-copy">
            <span class="option-title">Individual Session</span>
            <span class="option-subtitle">Check in for your scheduled appointment</span>
          </span>
        </button>

        <button id="absenceCard" class="option-card" type="button" data-form="absence">
          <span class="option-art">
            <img src="planned-absence.png" alt="">
          </span>
          <span class="option-copy">
            <span class="option-title">Planned Absence</span>
            <span class="option-subtitle">Tell us about an upcoming absence</span>
          </span>
        </button>
      </div>

      <p id="availabilityNote" class="availability-note" aria-live="polite"></p>

      <p class="privacy-note">
        Please protect your privacy by returning to this screen when finished.
      </p>
    </section>
  </main>

  <section id="loadingScreen" class="screen" aria-live="polite">
    <div class="loading-card">
      <img class="loading-logo" src="agd-logo.png" alt="">
      <h2>Welcome!</h2>
      <p class="loading-message">
        Preparing your sign-in<span class="animated-dots"></span>
      </p>
    </div>
  </section>

  <section id="formScreen" class="screen">
    <div class="form-shell">
      <header class="form-header">
        <button
          id="homeButton"
          class="home-button"
          type="button"
          aria-label="Return to home screen"
        >
          <span aria-hidden="true">⌂</span>
          <span>Home</span>
        </button>

        <h2 id="formTitle" class="form-title">Client Sign In</h2>

        <img class="header-logo" src="favicon.png" alt="">
      </header>

      <div class="iframe-wrap">
        <iframe
          id="formFrame"
          title="AGD client sign-in form"
          src=""
          allowfullscreen
          webkitallowfullscreen
          mozallowfullscreen
          msallowfullscreen
        ></iframe>

        <div id="returningOverlay" class="returning-overlay" aria-hidden="true">
          <div>
            <img src="agd-logo.png" alt="">
            <p>Returning home…</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const FORMS = {
      morning: {
        title: "Morning Group Check-In",
        url: "https://forms.office.com/Pages/ResponsePage.aspx?id=JTi6z33DuEK5DhZJchYzFw1uidru66JMp7tJxJNBC7VUMjVLSktSUklFVUxaTFZLTzk0SzNFQkZHQy4u&embed=true"
      },
      afternoon: {
        title: "Afternoon Group Check-In",
        url: "https://forms.office.com/Pages/ResponsePage.aspx?id=JTi6z33DuEK5DhZJchYzFw1uidru66JMp7tJxJNBC7VURENDRjVZVVRDSEdESFhJUVU3T1hKQU1FTy4u&embed=true"
      },
      individual: {
        title: "Individual Session Check-In",
        url: "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=JTi6z33DuEK5DhZJchYzFw1uidru66JMp7tJxJNBC7VUMUNHSjZITFVDWFpYMDY3WU5FSzhKVkZXRS4u&embed=true"
      },
      absence: {
        title: "Planned Absence",
        url: "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=JTi6z33DuEK5DhZJchYzFw1uidru66JMp7tJxJNBC7VUQU44OFo0NTQ1UDI3UFowQ0VPSEhaSVJaRy4u&embed=true"
      }
    };

    const INACTIVITY_MS = 5 * 60 * 1000;
    const PREPARING_SCREEN_MS = 900;

    // Time windows use the iPad's local time.
    // Morning is available before 11:45 AM.
    // Afternoon and Individual become available at 11:45 AM.
    const SWITCH_HOUR = 11;
    const SWITCH_MINUTE = 45;

    const homeScreen = document.getElementById("homeScreen");
    const loadingScreen = document.getElementById("loadingScreen");
    const formScreen = document.getElementById("formScreen");
    const formFrame = document.getElementById("formFrame");
    const formTitle = document.getElementById("formTitle");
    const returningOverlay = document.getElementById("returningOverlay");
    const morningCard = document.getElementById("morningCard");
    const afternoonCard = document.getElementById("afternoonCard");
    const individualCard = document.getElementById("individualCard");
    const availabilityNote = document.getElementById("availabilityNote");

    let inactivityTimer = null;
    let loadingTimer = null;
    let currentScreen = "home";

    function showOnly(screen) {
      [homeScreen, loadingScreen, formScreen].forEach((element) => {
        element.classList.remove("active");
      });

      screen.classList.add("active");
    }

    function minutesSinceMidnight(date) {
      return (date.getHours() * 60) + date.getMinutes();
    }

    function updateAvailableOptions() {
      const now = new Date();
      const switchTime = (SWITCH_HOUR * 60) + SWITCH_MINUTE;
      const afterSwitch = minutesSinceMidnight(now) >= switchTime;

      morningCard.hidden = afterSwitch;
      afternoonCard.hidden = !afterSwitch;
      individualCard.hidden = !afterSwitch;

      availabilityNote.textContent = afterSwitch
        ? "Morning Group check-in is closed for today."
        : "Afternoon Group and Individual Session check-in will appear at 11:45 AM.";
    }

    function openForm(formKey) {
      const selectedForm = FORMS[formKey];
      if (!selectedForm) return;

      clearTimers();

      currentScreen = "loading";
      formTitle.textContent = selectedForm.title;
      showOnly(loadingScreen);

      // Begin loading Microsoft Forms behind the short welcome transition.
      formFrame.src = selectedForm.url;

      loadingTimer = window.setTimeout(() => {
        currentScreen = "form";
        showOnly(formScreen);
        restartInactivityTimer();
      }, PREPARING_SCREEN_MS);
    }

    function restartInactivityTimer() {
      window.clearTimeout(inactivityTimer);

      inactivityTimer = window.setTimeout(() => {
        returnHome(true);
      }, INACTIVITY_MS);
    }

    function registerActivity() {
      if (currentScreen === "form") {
        restartInactivityTimer();
      }
    }

    function returnHome(isAutomatic = false) {
      if (currentScreen === "home") return;

      clearTimers();
      returningOverlay.classList.add("show");

      window.setTimeout(() => {
        formFrame.src = "";
        returningOverlay.classList.remove("show");
        currentScreen = "home";
        updateAvailableOptions();
        showOnly(homeScreen);
        window.scrollTo(0, 0);
      }, isAutomatic ? 500 : 250);
    }

    function clearTimers() {
      window.clearTimeout(inactivityTimer);
      window.clearTimeout(loadingTimer);
      inactivityTimer = null;
      loadingTimer = null;
    }

    document.querySelectorAll("[data-form]").forEach((button) => {
      button.addEventListener("click", () => {
        openForm(button.dataset.form);
      });
    });

    document.getElementById("homeButton").addEventListener("click", () => {
      returnHome(false);
    });

    /*
      The outer page can detect these interactions. Microsoft Forms is hosted
      on a different domain, so browser security prevents the page from reading
      every individual tap made inside the embedded form.
    */
    ["pointerdown", "touchstart", "keydown", "wheel"].forEach((eventName) => {
      document.addEventListener(eventName, registerActivity, { passive: true });
    });

    window.addEventListener("blur", registerActivity);
    window.addEventListener("focus", registerActivity);

    window.addEventListener("pageshow", () => {
      updateAvailableOptions();
      if (currentScreen !== "home") {
        returnHome(false);
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        clearTimers();
      } else {
        updateAvailableOptions();
        if (currentScreen === "form") {
          restartInactivityTimer();
        }
      }
    });

    updateAvailableOptions();
    window.setInterval(updateAvailableOptions, 60 * 1000);
  </script>
</body>
</html>
