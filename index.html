<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AGD Check In">
  <meta name="theme-color" content="#BC4043">
  <meta name="robots" content="noindex, nofollow, noarchive">

  <title>AGD Client Check In</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">

  <style>
    :root {
      --brand-red: #BC4043;
      --brand-red-dark: #963336;
      --cream: #F7F3ED;
      --white: #FFFFFF;
      --ink: #20242A;
      --muted: #66707A;
      --border: #E3E6E8;
      --shadow: 0 20px 55px rgba(32, 36, 42, 0.14);
      --morning: #247A4A;
      --morning-dark: #1A623A;
      --wellness: #386F9E;
      --wellness-dark: #2B587D;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overscroll-behavior: none;
    }

    button {
      font: inherit;
    }

    .screen {
      position: fixed;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 320ms ease, visibility 320ms ease;
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    /* HOME SCREEN */
    #homeScreen {
      display: grid;
      place-items: center;
      overflow-y: auto;
      padding:
        max(24px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 50% -10%, rgba(188, 64, 67, 0.12), transparent 47%),
        var(--cream);
    }

    .home-card {
      width: min(100%, 780px);
      padding: 34px 42px 42px;
      border: 1px solid rgba(188, 64, 67, 0.08);
      border-radius: 30px;
      background: var(--white);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .home-logo {
      display: block;
      width: min(58vw, 300px);
      max-height: 220px;
      margin: 0 auto 8px;
      object-fit: contain;
    }

    h1 {
      margin: 4px 0 0;
      font-size: clamp(2.15rem, 5vw, 3.35rem);
      line-height: 1.08;
      letter-spacing: -0.035em;
    }

    .welcome-copy {
      max-width: 600px;
      margin: 17px auto 29px;
      color: var(--muted);
      font-size: clamp(1.08rem, 2.7vw, 1.35rem);
      line-height: 1.5;
    }

    .button-grid {
      display: grid;
      gap: 20px;
    }

    .session-button {
      width: 100%;
      min-height: 110px;
      padding: 20px 26px;
      border: 0;
      border-radius: 22px;
      color: var(--white);
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 10px 24px rgba(32, 36, 42, 0.17);
      transition: transform 120ms ease, filter 120ms ease;
    }

    .session-button:active {
      transform: scale(0.985);
      filter: brightness(0.94);
    }

    .session-button.morning {
      background: linear-gradient(145deg, var(--morning), var(--morning-dark));
    }

    .session-button.wellness {
      background: linear-gradient(145deg, var(--wellness), var(--wellness-dark));
    }

    .button-time,
    .button-program {
      display: block;
    }

    .button-time {
      font-size: clamp(1.4rem, 3.8vw, 1.9rem);
      font-weight: 800;
      line-height: 1.2;
    }

    .button-program {
      margin-top: 5px;
      font-size: clamp(1.12rem, 3vw, 1.38rem);
      font-weight: 650;
    }

    .privacy-note {
      margin: 25px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    /* PREPARING SCREEN */
    #loadingScreen {
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--cream);
      text-align: center;
    }

    .loading-card {
      width: min(100%, 560px);
      padding: 42px 32px;
      border-radius: 30px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .loading-logo {
      width: min(60vw, 260px);
      max-height: 200px;
      object-fit: contain;
    }

    .loading-card h2 {
      margin: 20px 0 8px;
      font-size: clamp(2rem, 5vw, 2.85rem);
      line-height: 1.1;
    }

    .loading-message {
      margin: 0;
      color: var(--muted);
      font-size: 1.24rem;
    }

    .animated-dots::after {
      display: inline-block;
      width: 1.2em;
      content: "";
      text-align: left;
      animation: dotCycle 1.2s steps(4, end) infinite;
    }

    @keyframes dotCycle {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75%, 100% { content: "..."; }
    }

    /* FORM SCREEN */
    #formScreen {
      background: var(--white);
    }

    .form-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .form-header {
      z-index: 10;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 68px;
      padding:
        max(10px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        10px
        max(14px, env(safe-area-inset-left));
      border-bottom: 1px solid var(--border);
      background: var(--white);
      box-shadow: 0 2px 12px rgba(32, 36, 42, 0.08);
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 44px;
      padding: 8px 13px;
      border: 1px solid #D9DDE0;
      border-radius: 13px;
      background: #F8F9FA;
      color: #3E464E;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .home-button:active {
      background: #ECEFF1;
    }

    .form-title {
      margin: 0;
      overflow: hidden;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
    }

    .header-logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .iframe-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    #formFrame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--white);
    }

    .returning-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      visibility: hidden;
      opacity: 0;
      background: rgba(255, 255, 255, 0.97);
      text-align: center;
      transition: opacity 260ms ease, visibility 260ms ease;
    }

    .returning-overlay.show {
      visibility: visible;
      opacity: 1;
    }

    .returning-overlay img {
      width: min(55vw, 240px);
      max-height: 190px;
      object-fit: contain;
    }

    .returning-overlay p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1.15rem;
    }

    @media (max-width: 560px) {
      #homeScreen {
        padding: 0;
        background: var(--white);
      }

      .home-card {
        min-height: 100%;
        padding: 24px 22px 30px;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .home-logo {
        width: min(62vw, 250px);
      }

      .session-button {
        min-height: 96px;
      }

      .form-header {
        grid-template-columns: auto 1fr;
      }

      .header-logo {
        display: none;
      }
    }

    @media (orientation: landscape) and (max-height: 700px) {
      .home-card {
        width: min(100%, 980px);
        padding: 16px 30px 22px;
      }

      .home-logo {
        width: min(25vw, 220px);
        max-height: 150px;
      }

      h1 {
        font-size: 2rem;
      }

      .welcome-copy {
        margin: 8px auto 15px;
        font-size: 1rem;
      }

      .button-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .session-button {
        min-height: 82px;
      }

      .privacy-note {
        margin-top: 13px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <main id="homeScreen" class="screen active" aria-labelledby="appTitle">
    <section class="home-card">
      <img
        class="home-logo"
        src="agd-logo.png"
        alt="A Good Deed Behavioral Health logo"
      >

      <h1 id="appTitle">AGD Client Check In</h1>

      <p class="welcome-copy">
        Welcome! Please select the group session you are signing into.
      </p>

      <div class="button-grid">
        <button class="session-button morning" type="button" data-form="morning">
          <span class="button-time">8:30a–11:30a</span>
          <span class="button-program">IOP / MHDT</span>
        </button>

        <button class="session-button wellness" type="button" data-form="afternoon">
          <span class="button-time">12:00p–1:00p</span>
          <span class="button-program">Wellness</span>
        </button>
      </div>

      <p class="privacy-note">
        Please protect your privacy by returning to this screen when finished.
      </p>
    </section>
  </main>

  <section id="loadingScreen" class="screen" aria-live="polite">
    <div class="loading-card">
      <img class="loading-logo" src="agd-logo.png" alt="">
      <h2>Welcome!</h2>
      <p class="loading-message">
        Preparing your sign-in<span class="animated-dots"></span>
      </p>
    </div>
  </section>

  <section id="formScreen" class="screen">
    <div class="form-shell">
      <header class="form-header">
        <button
          id="homeButton"
          class="home-button"
          type="button"
          aria-label="Return to home screen"
        >
          <span aria-hidden="true">⌂</span>
          <span>Home</span>
        </button>

        <h2 id="formTitle" class="form-title">Client Sign In</h2>

        <img class="header-logo" src="favicon.png" alt="">
      </header>

      <div class="iframe-wrap">
        <iframe
          id="formFrame"
          title="AGD client sign-in form"
          src=""
          allowfullscreen
          webkitallowfullscreen
          mozallowfullscreen
          msallowfullscreen
        ></iframe>

        <div id="returningOverlay" class="returning-overlay" aria-hidden="true">
          <div>
            <img src="agd-logo.png" alt="">
            <p>Returning home…</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const FORMS = {
      morning: {
        title: "8:30a–11:30a IOP / MHDT",
        url: "https://forms.office.com/Pages/ResponsePage.aspx?id=JTi6z33DuEK5DhZJchYzFw1uidru66JMp7tJxJNBC7VUMjVLSktSUklFVUxaTFZLTzk0SzNFQkZHQy4u&embed=true"
      },
      afternoon: {
        title: "12:00p–1:30p Wellness",
        url: "https://forms.office.com/Pages/ResponsePage.aspx?id=JTi6z33DuEK5DhZJchYzFw1uidru66JMp7tJxJNBC7VURENDRjVZVVRDSEdESFhJUVU3T1hKQU1FTy4u&embed=true"
      }
    };

    const INACTIVITY_MS = 5 * 60 * 1000;
    const PREPARING_SCREEN_MS = 900;

    const homeScreen = document.getElementById("homeScreen");
    const loadingScreen = document.getElementById("loadingScreen");
    const formScreen = document.getElementById("formScreen");
    const formFrame = document.getElementById("formFrame");
    const formTitle = document.getElementById("formTitle");
    const returningOverlay = document.getElementById("returningOverlay");

    let inactivityTimer = null;
    let loadingTimer = null;
    let currentScreen = "home";

    function showOnly(screen) {
      [homeScreen, loadingScreen, formScreen].forEach((element) => {
        element.classList.remove("active");
      });

      screen.classList.add("active");
    }

    function openForm(formKey) {
      const selectedForm = FORMS[formKey];
      if (!selectedForm) return;

      clearTimers();

      currentScreen = "loading";
      formTitle.textContent = selectedForm.title;
      showOnly(loadingScreen);

      // Begin loading Microsoft Forms behind the short welcome transition.
      formFrame.src = selectedForm.url;

      loadingTimer = window.setTimeout(() => {
        currentScreen = "form";
        showOnly(formScreen);
        restartInactivityTimer();
      }, PREPARING_SCREEN_MS);
    }

    function restartInactivityTimer() {
      window.clearTimeout(inactivityTimer);

      inactivityTimer = window.setTimeout(() => {
        returnHome(true);
      }, INACTIVITY_MS);
    }

    function registerActivity() {
      if (currentScreen === "form") {
        restartInactivityTimer();
      }
    }

    function returnHome(isAutomatic = false) {
      if (currentScreen === "home") return;

      clearTimers();
      returningOverlay.classList.add("show");

      window.setTimeout(() => {
        formFrame.src = "";
        returningOverlay.classList.remove("show");
        currentScreen = "home";
        showOnly(homeScreen);
        window.scrollTo(0, 0);
      }, isAutomatic ? 500 : 250);
    }

    function clearTimers() {
      window.clearTimeout(inactivityTimer);
      window.clearTimeout(loadingTimer);
      inactivityTimer = null;
      loadingTimer = null;
    }

    document.querySelectorAll("[data-form]").forEach((button) => {
      button.addEventListener("click", () => {
        openForm(button.dataset.form);
      });
    });

    document.getElementById("homeButton").addEventListener("click", () => {
      returnHome(false);
    });

    /*
      The outer page can detect these interactions. Microsoft Forms is hosted
      on a different domain, so browser security prevents the page from reading
      every individual tap made inside the embedded form.
    */
    ["pointerdown", "touchstart", "keydown", "wheel"].forEach((eventName) => {
      document.addEventListener(eventName, registerActivity, { passive: true });
    });

    window.addEventListener("blur", registerActivity);
    window.addEventListener("focus", registerActivity);

    window.addEventListener("pageshow", () => {
      if (currentScreen !== "home") {
        returnHome(false);
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        clearTimers();
      } else if (currentScreen === "form") {
        restartInactivityTimer();
      }
    });
  </script>
</body>
</html>
