<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="theme-color" content="#f7f4ef">
  <title>Client Sign-In</title>
  <style>
    :root {
      --brand-red: #bb3f42;
      --ink: #1f2933;
      --muted: #5f6b76;
      --page: #f7f4ef;
      --card: #ffffff;
      --morning: #16851f;
      --afternoon: #0878d1;
      --shadow: 0 16px 42px rgba(31, 41, 51, 0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: max(22px, env(safe-area-inset-top))
               max(18px, env(safe-area-inset-right))
               max(22px, env(safe-area-inset-bottom))
               max(18px, env(safe-area-inset-left));
    }

    .portal {
      width: min(100%, 760px);
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      text-align: center;
    }

    .brand {
      padding: 30px 28px 18px;
      background:
        radial-gradient(circle at 50% 0%, rgba(187,63,66,.10), transparent 58%),
        #fff;
    }

    .brand img {
      display: block;
      width: min(54vw, 300px);
      max-width: 100%;
      height: auto;
      margin: 0 auto 8px;
    }

    .content {
      padding: 12px 34px 38px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.25rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .welcome {
      margin: 18px auto 26px;
      max-width: 560px;
      font-size: clamp(1.05rem, 3.4vw, 1.35rem);
      line-height: 1.5;
      color: var(--muted);
    }

    .actions {
      display: grid;
      gap: 20px;
      margin-top: 28px;
    }

    .sign-in-button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 92px;
      width: 100%;
      border-radius: 20px;
      padding: 18px 22px;
      color: #fff;
      text-decoration: none;
      font-size: clamp(1.2rem, 4.2vw, 1.65rem);
      font-weight: 750;
      line-height: 1.2;
      box-shadow: 0 9px 22px rgba(0,0,0,.14);
      transition: transform .08s ease, filter .08s ease;
      touch-action: manipulation;
    }

    .sign-in-button:active {
      transform: scale(.985);
      filter: brightness(.94);
    }

    .morning {
      background: var(--morning);
    }

    .afternoon {
      background: var(--afternoon);
    }

    .button-icon {
      font-size: 1.35em;
      margin-right: 12px;
      line-height: 1;
    }

    .helper {
      margin: 26px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
    }

    @media (max-width: 520px) {
      body {
        padding: 0;
        background: #fff;
      }

      .portal {
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }

      .brand {
        padding-top: 20px;
      }

      .brand img {
        width: min(68vw, 285px);
      }

      .content {
        padding: 8px 22px 30px;
      }

      .sign-in-button {
        min-height: 82px;
      }
    }

    @media (orientation: landscape) and (max-height: 700px) {
      body {
        padding: 12px;
      }

      .portal {
        width: min(100%, 900px);
      }

      .brand {
        padding: 12px 22px 4px;
      }

      .brand img {
        width: min(25vw, 210px);
        margin-bottom: 0;
      }

      .content {
        padding: 4px 28px 22px;
      }

      h1 {
        font-size: 2rem;
      }

      .welcome {
        margin: 8px auto 14px;
        font-size: 1rem;
      }

      .actions {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 14px;
      }

      .sign-in-button {
        min-height: 78px;
        font-size: 1.15rem;
      }

      .helper {
        margin-top: 14px;
      }
    }
  </style>
</head>
