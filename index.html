<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AGD Check In">
  <meta name="theme-color" content="#0E294D">
  <meta name="robots" content="noindex, nofollow, noarchive">

  <title>AGD Client Check In</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">

  <style>
    :root {
      --navy: #0E294D;
      --navy-dark: #071B35;
      --teal: #159B95;
      --teal-dark: #0D7772;
      --coral: #D75D61;
      --gold: #E6A11C;
      --cream: #F8FAFC;
      --white: #FFFFFF;
      --ink: #122544;
      --muted: #5F6F82;
      --border: #DCE4EC;
      --shadow: 0 15px 38px rgba(14, 41, 77, 0.15);
      --card-shadow: 0 8px 20px rgba(14, 41, 77, 0.13);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overscroll-behavior: none;
    }

    button {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    .screen {
      position: fixed;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 280ms ease, visibility 280ms ease;
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    /* HOME SCREEN */
    #homeScreen {
      overflow-y: auto;
      padding:
        max(22px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(28px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 50% -12%, rgba(21, 155, 149, 0.12), transparent 42%),
        linear-gradient(180deg, #F7FAFD 0%, #EFF5FA 100%);
    }

    .home-shell {
      width: min(100%, 840px);
      margin: 0 auto;
      text-align: center;
    }

    .brand-lockup {
      margin-bottom: 10px;
    }

    .brand-name {
      margin: 0;
      color: var(--navy);
      font-size: clamp(3rem, 8vw, 5.4rem);
      font-weight: 850;
      line-height: 0.92;
      letter-spacing: 0.04em;
    }

    .brand-subtitle {
      margin-top: 8px;
      color: var(--teal);
      font-size: clamp(1rem, 2.8vw, 1.45rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(2.15rem, 5vw, 3.35rem);
      line-height: 1.06;
      letter-spacing: -0.04em;
    }

    .welcome-copy {
      max-width: 680px;
      margin: 12px auto 24px;
      color: var(--ink);
      font-size: clamp(1.05rem, 2.6vw, 1.32rem);
      line-height: 1.45;
    }

    .button-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 17px;
      width: min(100%, 780px);
      margin: 0 auto;
    }

    .option-card {
      display: grid;
      grid-template-columns: minmax(210px, 42%) minmax(0, 1fr);
      width: 100%;
      min-height: 190px;
      padding: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--white);
      color: var(--ink);
      box-shadow: var(--card-shadow);
      cursor: pointer;
      touch-action: manipulation;
      text-align: left;
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }

    .option-card:active {
      transform: scale(0.987);
      filter: brightness(0.98);
      box-shadow: 0 5px 14px rgba(14, 41, 77, 0.15);
    }

    .option-card:focus-visible,
    .home-button:focus-visible {
      outline: 4px solid rgba(21, 155, 149, 0.35);
      outline-offset: 3px;
    }

    .option-art {
      position: relative;
      min-width: 0;
      min-height: 188px;
      overflow: hidden;
      background: #E9EFF4;
    }

    .option-art img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 188px;
      object-fit: cover;
      object-position: center;
    }

    /* CSS sunrise artwork keeps Morning visually rich without adding another file. */
    .morning-art {
      background:
        radial-gradient(circle at 54% 60%, #FFF7CB 0 7%, #FFD35C 8% 13%, transparent 14%),
        linear-gradient(180deg, #80BDE5 0%, #F7C27D 56%, #D67843 100%);
    }

    .morning-art::before,
    .morning-art::after {
      content: "";
      position: absolute;
      right: -8%;
      bottom: -20%;
      left: -8%;
      height: 52%;
      border-radius: 50% 50% 0 0;
      background: #456B65;
      transform: rotate(-4deg);
    }

    .morning-art::after {
      right: -16%;
      bottom: -30%;
      left: 15%;
      height: 58%;
      background: #274D4C;
      transform: rotate(7deg);
    }

    .option-copy {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      padding: 23px 80px 22px 28px;
    }

    .option-title {
      display: block;
      color: var(--navy);
      font-size: clamp(1.55rem, 3.1vw, 2.05rem);
      font-weight: 800;
      line-height: 1.14;
    }

    .option-meta {
      display: block;
      margin-top: 9px;
      color: var(--teal);
      font-size: clamp(1.12rem, 2.4vw, 1.38rem);
      font-weight: 750;
      line-height: 1.25;
    }

    .option-description {
      display: block;
      margin-top: 9px;
      color: var(--ink);
      font-size: clamp(0.98rem, 2vw, 1.12rem);
      line-height: 1.4;
    }

    .card-icon {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      color: var(--teal);
    }

    .card-icon.sun {
      color: var(--gold);
    }

    .card-icon.calendar {
      color: var(--coral);
    }

    .status-panel {
      width: min(100%, 780px);
      margin: 20px auto 0;
      padding: 13px 18px;
      border: 1px solid rgba(21, 155, 149, 0.18);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.4;
    }

    .privacy-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .home-footer {
      width: min(100%, 780px);
      margin: 22px auto 0;
      padding: 15px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--navy), var(--navy-dark));
      color: var(--white);
      font-size: 1rem;
      font-weight: 650;
      letter-spacing: 0.01em;
    }

    /* PREPARING SCREEN */
    #loadingScreen {
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #F7FAFD 0%, #EFF5FA 100%);
      text-align: center;
    }

    .loading-card {
      width: min(100%, 560px);
      padding: 42px 32px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .loading-logo {
      width: min(60vw, 260px);
      max-height: 200px;
      object-fit: contain;
    }

    .loading-card h2 {
      margin: 20px 0 8px;
      color: var(--navy);
      font-size: clamp(2rem, 5vw, 2.85rem);
      line-height: 1.1;
    }

    .loading-message {
      margin: 0;
      color: var(--muted);
      font-size: 1.24rem;
    }

    .animated-dots::after {
      display: inline-block;
      width: 1.2em;
      content: "";
      text-align: left;
      animation: dotCycle 1.2s steps(4, end) infinite;
    }

    @keyframes dotCycle {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75%, 100% { content: "..."; }
    }

    /* FORM SCREEN */
    #formScreen {
      background: var(--white);
    }

    .form-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .form-header {
      z-index: 10;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 68px;
      padding:
        max(10px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        10px
        max(14px, env(safe-area-inset-left));
      border-bottom: 1px solid var(--border);
      background: var(--white);
      box-shadow: 0 2px 12px rgba(14, 41, 77, 0.08);
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 44px;
      padding: 8px 13px;
      border: 1px solid #D5DEE7;
      border-radius: 13px;
      background: #F6F9FB;
      color: var(--navy);
      font-size: 0.98rem;
      font-weight: 750;
      cursor: pointer;
      touch-action: manipulation;
    }

    .home-button:active {
      background: #E9F0F5;
    }

    .form-title {
      margin: 0;
      overflow: hidden;
      color: var(--navy);
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
    }

    .header-logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .iframe-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    #formFrame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--white);
    }

    .returning-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      visibility: hidden;
      opacity: 0;
      background: rgba(255, 255, 255, 0.97);
      text-align: center;
      transition: opacity 260ms ease, visibility 260ms ease;
    }

    .returning-overlay.show {
      visibility: visible;
      opacity: 1;
    }

    .returning-overlay img {
      width: min(55vw, 240px);
      max-height: 190px;
      object-fit: contain;
    }

    .returning-overlay p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1.15rem;
    }

    @media (max-width: 640px) {
      #homeScreen {
        padding: 18px 12px 24px;
      }

      .home-logo {
        width: min(60vw, 235px);
      }

      .option-card {
        grid-template-columns: 39% minmax(0, 1fr);
        min-height: 158px;
        border-radius: 18px;
      }

      .option-art,
      .option-art img {
        min-height: 156px;
      }

      .option-copy {
        padding: 18px 56px 18px 19px;
      }

      .card-icon {
        top: 18px;
        right: 17px;
        width: 34px;
        height: 34px;
      }

      .form-header {
        grid-template-columns: auto 1fr;
      }

      .header-logo {
        display: none;
      }
    }

    @media (max-width: 430px) {
      .option-card {
        grid-template-columns: 1fr;
      }

      .option-art,
      .option-art img {
        min-height: 145px;
        max-height: 165px;
      }

      .option-copy {
        min-height: 135px;
        padding: 18px 58px 18px 20px;
      }
    }

    @media (orientation: landscape) and (max-height: 700px) {
      #homeScreen {
        padding-top: 12px;
      }

      .home-logo {
        width: min(24vw, 185px);
        max-height: 108px;
      }

      h1 {
        font-size: 2rem;
      }

      .welcome-copy {
        margin: 7px auto 14px;
        font-size: 1rem;
      }

      .button-stack {
        gap: 12px;
      }

      .option-card {
        min-height: 142px;
      }

      .option-art,
      .option-art img {
        min-height: 140px;
      }

      .option-copy {
        padding-top: 15px;
        padding-bottom: 15px;
      }

      .option-title {
        font-size: 1.45rem;
      }

      .option-meta {
        margin-top: 5px;
        font-size: 1.02rem;
      }

      .option-description {
        margin-top: 5px;
        font-size: 0.92rem;
      }

      .status-panel {
        margin-top: 12px;
        padding: 9px 14px;
        font-size: 0.88rem;
      }

      .privacy-note {
        margin-top: 7px;
        font-size: 0.8rem;
      }

      .home-footer {
        margin-top: 12px;
        padding: 10px 16px;
        font-size: 0.88rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <main id="homeScreen" class="screen active" aria-labelledby="appTitle">
    <section class="home-shell">
      <div class="brand-lockup" aria-label="AGD Client Sign-In">
        <div class="brand-name">AGD</div>
        <div class="brand-subtitle">Client Sign-In</div>
      </div>

      <h1 id="appTitle">Welcome!</h1>

      <p class="welcome-copy">
        Please choose one of the options below to continue.
      </p>

      <div class="button-stack">
        <button id="morningCard" class="option-card" type="button" data-form="morning">
          <span class="option-art morning-art" aria-hidden="true"></span>
          <span class="option-copy">
            <svg class="card-icon sun" viewBox="0 0 48 48" aria-hidden="true">
              <circle cx="24" cy="24" r="8" fill="none" stroke="currentColor" stroke-width="3"/>
              <path d="M24 5v6M24 37v6M5 24h6M37 24h6M10.6 10.6l4.2 4.2M33.2 33.2l4.2 4.2M37.4 10.6l-4.2 4.2M14.8 33.2l-4.2 4.2" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <span class="option-title">Morning Group</span>
            <span class="option-meta">8:30 AM–11:30 AM</span>
            <span class="option-description">Sign in for IOP or MHDT morning group.</span>
          </span>
        </button>

        <button id="afternoonCard" class="option-card" type="button" data-form="afternoon">
          <span class="option-art">
            <img src="afternoon-group.png" alt="">
          </span>
          <span class="option-copy">
            <svg class="card-icon" viewBox="0 0 48 48" aria-hidden="true">
              <circle cx="24" cy="24" r="18" fill="none" stroke="currentColor" stroke-width="3"/>
              <path d="M24 13v12l8 5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="option-title">Wellness Group</span>
            <span class="option-meta">12:00 PM–1:00 PM</span>
            <span class="option-description">Sign in for wellness group.</span>
          </span>
        </button>

        <button id="individualCard" class="option-card" type="button" data-form="individual">
          <span class="option-art">
            <img src="individual-session.png" alt="">
          </span>
          <span class="option-copy">
            <svg class="card-icon" viewBox="0 0 48 48" aria-hidden="true">
              <circle cx="24" cy="17" r="8" fill="none" stroke="currentColor" stroke-width="3"/>
              <path d="M10 42c1.3-9.3 6-14 14-14s12.7 4.7 14 14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <span class="option-title">Individual Session</span>
            <span class="option-meta">By appointment</span>
            <span class="option-description">Sign in for your individual session.</span>
          </span>
        </button>

        <button id="absenceCard" class="option-card" type="button" data-form="absence">
          <span class="option-art">
            <img src="planned-absence.png" alt="">
          </span>
          <span class="option-copy">
            <svg class="card-icon calendar" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="7" y="10" width="34" height="31" rx="4" fill="none" stroke="currentColor" stroke-width="3"/>
              <path d="M15 6v8M33 6v8M7 19h34" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <circle cx="16" cy="27" r="1.8" fill="currentColor"/>
              <circle cx="24" cy="27" r="1.8" fill="currentColor"/>
              <circle cx="32" cy="27" r="1.8" fill="currentColor"/>
              <circle cx="16" cy="35" r="1.8" fill="currentColor"/>
              <circle cx="24" cy="35" r="1.8" fill="currentColor"/>
              <circle cx="32" cy="35" r="1.8" fill="currentColor"/>
            </svg>
            <span class="option-title">Planned Absence</span>
            <span class="option-meta">Let us know</span>
            <span class="option-description">Report a planned absence from programming.</span>
          </span>
        </button>
      </div>

      <p id="availabilityNote" class="status-panel" aria-live="polite"></p>

      <p class="privacy-note">
        You will be returned to this screen after 5 minutes of inactivity.
      </p>

      <footer class="home-footer">
        A Good Deed Behavioral Health
      </footer>
    </section>
  </main>

  <section id="loadingScreen" class="screen" aria-live="polite">
    <div class="loading-card">
      <img class="loading-logo" src="agd-logo.png" alt="">
      <h2>Welcome!</h2>
      <p class="loading-message">
        Preparing your sign-in<span class="animated-dots"></span>
      </p>
    </div>
  </section>

  <section id="formScreen" class="screen">
    <div class="form-shell">
      <header class="form-header">
        <button
          id="homeButton"
          class="home-button"
          type="button"
          aria-label="Return to home screen"
        >
          <span aria-hidden="true">⌂</span>
          <span>Home</span>
        </button>

        <h2 id="formTitle" class="form-title">Client Sign In</h2>

        <img class="header-logo" src="favicon.png" alt="">
      </header>

      <div class="iframe-wrap">
        <iframe
          id="formFrame"
          title="AGD client sign-in form"
          src=""
          allowfullscreen
          webkitallowfullscreen
          mozallowfullscreen
          msallowfullscreen
        ></iframe>

        <div id="returningOverlay" class="returning-overlay" aria-hidden="true">
          <div>
            <img src="agd-logo.png" alt="">
            <p>Returning home…</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const FORMS = {
      morning: {
        title: "Morning Group Check-In",
        url: "https://forms.office.com/Pages/ResponsePage.aspx?id=JTi6z33DuEK5DhZJchYzFw1uidru66JMp7tJxJNBC7VUMjVLSktSUklFVUxaTFZLTzk0SzNFQkZHQy4u&embed=true"
      },
      afternoon: {
        title: "Wellness Group Check-In",
        url: "https://forms.office.com/Pages/ResponsePage.aspx?id=JTi6z33DuEK5DhZJchYzFw1uidru66JMp7tJxJNBC7VURENDRjVZVVRDSEdESFhJUVU3T1hKQU1FTy4u&embed=true"
      },
      individual: {
        title: "Individual Session Check-In",
        url: "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=JTi6z33DuEK5DhZJchYzFw1uidru66JMp7tJxJNBC7VUMUNHSjZITFVDWFpYMDY3WU5FSzhKVkZXRS4u&embed=true"
      },
      absence: {
        title: "Planned Absence",
        url: "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=JTi6z33DuEK5DhZJchYzFw1uidru66JMp7tJxJNBC7VUQU44OFo0NTQ1UDI3UFowQ0VPSEhaSVJaRy4u&embed=true"
      }
    };

    const INACTIVITY_MS = 5 * 60 * 1000;
    const PREPARING_SCREEN_MS = 900;

    // The kiosk uses the iPad's local time.
    // Morning remains available until 11:45 AM.
    // Afternoon and Individual become available at 11:45 AM.
    const SWITCH_HOUR = 11;
    const SWITCH_MINUTE = 45;

    const homeScreen = document.getElementById("homeScreen");
    const loadingScreen = document.getElementById("loadingScreen");
    const formScreen = document.getElementById("formScreen");
    const formFrame = document.getElementById("formFrame");
    const formTitle = document.getElementById("formTitle");
    const returningOverlay = document.getElementById("returningOverlay");
    const morningCard = document.getElementById("morningCard");
    const afternoonCard = document.getElementById("afternoonCard");
    const individualCard = document.getElementById("individualCard");
    const availabilityNote = document.getElementById("availabilityNote");

    let inactivityTimer = null;
    let loadingTimer = null;
    let currentScreen = "home";

    function showOnly(screen) {
      [homeScreen, loadingScreen, formScreen].forEach((element) => {
        element.classList.remove("active");
      });

      screen.classList.add("active");
    }

    function minutesSinceMidnight(date) {
      return (date.getHours() * 60) + date.getMinutes();
    }

   function updateAvailableOptions() {
    const now = new Date();
    const currentTime = minutesSinceMidnight(now);

    const morningEnd = (SWITCH_HOUR * 60) + SWITCH_MINUTE; // 11:45 AM
    const wellnessEnd = (13 * 60) + 30; // 1:30 PM

    // Morning: before 11:45
    morningCard.hidden = currentTime >= morningEnd;

    // Wellness: 11:45 - 1:30
    afternoonCard.hidden = currentTime < morningEnd || currentTime >= wellnessEnd;

    // Individual: after 11:45
    individualCard.hidden = currentTime < morningEnd;

    // Planned Absence stays visible (don't hide it)

    if (currentTime < morningEnd) {
        availabilityNote.textContent =
            "Wellness Group and Individual Session check-in will appear at 11:45 AM.";
    } else if (currentTime < wellnessEnd) {
        availabilityNote.textContent =
            "Morning Group check-in is closed for today.";
    } else {
        availabilityNote.textContent =
            "Wellness Group check-in is closed for today.";
    }
}

    function openForm(formKey) {
      const selectedForm = FORMS[formKey];
      if (!selectedForm) return;

      clearTimers();

      currentScreen = "loading";
      formTitle.textContent = selectedForm.title;
      showOnly(loadingScreen);

      // Load Microsoft Forms behind the brief welcome transition.
      formFrame.src = selectedForm.url;

      loadingTimer = window.setTimeout(() => {
        currentScreen = "form";
        showOnly(formScreen);
        restartInactivityTimer();
      }, PREPARING_SCREEN_MS);
    }

    function restartInactivityTimer() {
      window.clearTimeout(inactivityTimer);

      inactivityTimer = window.setTimeout(() => {
        returnHome(true);
      }, INACTIVITY_MS);
    }

    function registerActivity() {
      if (currentScreen === "form") {
        restartInactivityTimer();
      }
    }

    function returnHome(isAutomatic = false) {
      if (currentScreen === "home") return;

      clearTimers();
      returningOverlay.classList.add("show");

      window.setTimeout(() => {
        formFrame.src = "";
        returningOverlay.classList.remove("show");
        currentScreen = "home";
        updateAvailableOptions();
        showOnly(homeScreen);
        window.scrollTo(0, 0);
      }, isAutomatic ? 500 : 250);
    }

    function clearTimers() {
      window.clearTimeout(inactivityTimer);
      window.clearTimeout(loadingTimer);
      inactivityTimer = null;
      loadingTimer = null;
    }

    document.querySelectorAll("[data-form]").forEach((button) => {
      button.addEventListener("click", () => {
        openForm(button.dataset.form);
      });
    });

    document.getElementById("homeButton").addEventListener("click", () => {
      returnHome(false);
    });

    /*
      Microsoft Forms is hosted on a different domain. Browser security prevents
      this page from reading every individual tap inside the embedded form, but
      activity on the outer page still resets the inactivity timer.
    */
    ["pointerdown", "touchstart", "keydown", "wheel"].forEach((eventName) => {
      document.addEventListener(eventName, registerActivity, { passive: true });
    });

    window.addEventListener("blur", registerActivity);
    window.addEventListener("focus", registerActivity);

    window.addEventListener("pageshow", () => {
      updateAvailableOptions();
      if (currentScreen !== "home") {
        returnHome(false);
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        clearTimers();
      } else {
        updateAvailableOptions();
        if (currentScreen === "form") {
          restartInactivityTimer();
        }
      }
    });

    updateAvailableOptions();
    window.setInterval(updateAvailableOptions, 60 * 1000);
  </script>
</body>
</html>
